server {
    listen 8080;
    server_name _;

    # Static dashboard demo.
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Reverse-proxy the WebSocket HITL channel. This nginx process shares
    # lola-core's network namespace (see docker-compose.yml's
    # `network_mode: "service:lola-core"`), so 127.0.0.1:8765 here really
    # is lola-core's loopback-only WebSocket server — proxying it out to
    # :8080/ws is what makes it reachable from a browser on the host,
    # without ever changing lola-core's own bind address.
    location /ws {
        proxy_pass http://127.0.0.1:8765/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
